<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StickWorld — Coming Soon</title>
<link rel="icon" type="image/png" href="https://stickworld.neocities.org/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(160deg,#1a2a4a,#0d1520);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;
}
.card{
  width:min(360px,90vw);
  padding:30px;
  border-radius:18px;
  text-align:center;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(100,180,255,0.2);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  color:#c8daf8;
}
.logo-icon{
  width:70px;height:70px;
  margin:0 auto 14px;
  background:url("https://stickworld.neocities.org/favicon.png") center/cover no-repeat;
  border-radius:16px;
  box-shadow:0 0 25px rgba(91,163,245,0.6);
}
h1{
  font-family:'Orbitron',monospace;
  font-size:22px;margin:15px 0;
  color:#5ba3f5;letter-spacing:3px;
}
p{font-size:14px;opacity:0.8;margin-bottom:10px;}
.small{font-size:12px;opacity:0.5;}
button{
  margin-top:15px;padding:10px 20px;
  border-radius:10px;
  border:1px solid rgba(91,163,245,0.3);
  background:rgba(91,163,245,0.1);
  color:#5ba3f5;cursor:pointer;transition:0.2s;
}
button:hover{background:rgba(91,163,245,0.2);}
</style>
</head>
<body>
  <div class="card">
    <div class="logo-icon"></div>
    <h1>MAYBE COMING SOON</h1>
    <p>The .MSIX file is not available yet.</p>
    <p class="small">Stay tuned for updates!</p>
    <button onclick="window.location.href='https://stickworld.onrender.com/download.html'">MAYBE COMING SOON</button>
  </div>
</body>
</html>
