<!DOCTYPE html> <html> <head> <title>StickWorld</title> <style> body { margin: 0; overflow: hidden; font-family: Arial; background: linear-gradient(#bfe9ff, #ffffff); } canvas { display: block; } /* TOP BAR */ #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border-radius: 14px; } button { background: rgba(0,0,0,0.08); border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; } /* CHAT */ #chat { position: absolute; bottom: 10px; left: 10px; width: 250px; background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border-radius: 12px; padding: 10px; } #msgs { height: 110px; overflow-y: auto; font-size: 12px; } #msg { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ccc; } /* MOBILE */ #controls { position: absolute; bottom: 20px; right: 20px; display: none; grid-template-columns: 50px 50px 50px; gap: 5px; } .btn { width: 50px; height: 50px; background: rgba(0,0,0,0.15); border-radius: 10px; text-align: center; line-height: 50px; user-select: none; } </style> </head> <body> <div id="ui"> <div>StickWorld</div> <div> <div id="name"></div> Coins: <span id="coins">0</span><br> <span id="timer">Loading...</span> </div> <button onclick="logout()">Logout</button> </div> <div id="chat"> <div id="msgs"></div> <input id="msg" placeholder="chat..."> </div> <div id="controls"> <div></div> <div class="btn" onclick="jump()">⬆</div> <div></div> <div class="btn" onclick="left()">⬅</div> <div class="btn" onclick="down()">⬇</div> <div class="btn" onclick="right()">➡</div> </div> <canvas id="c"></canvas> <script src="/socket.io/socket.io.js"></script> <script> const socket = io(); /* USER */ const username = localStorage.getItem("username"); if(!username) location.href="/login.html"; document.getElementById("name").innerText = username; /* MOBILE */ if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){ document.getElementById("controls").style.display = "grid"; } /* STATE */ let players = {}; let x = 300; let y = 500; /* JOIN */ socket.emit("join",{username}); /* RECEIVE PLAYERS */ socket.on("players", p=>{ players = p; for(let id in p){ if(p[id].username === username){ document.getElementById("coins").innerText = p[id].coins ?? 0; let t = p[id].timeLeft ?? 600000; let m = Math.floor(t/60000); let s = Math.floor((t%60000)/1000); document.getElementById("timer").innerText = "Next 50 coins in " + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0'); } } }); /* CHAT */ socket.on("chat", data=>{ addChat(data.username, data.text); }); /* CHAT UI */ function addChat(u,t){ const d=document.createElement("div"); d.innerText=u+": "+t; document.getElementById("msgs").appendChild(d); } /* INPUT */ document.getElementById("msg").addEventListener("keydown",e=>{ if(e.key==="Enter"){ socket.emit("chat",{text:e.target.value}); e.target.value=""; } }); /* MOVEMENT (ONLY X - SERVER HANDLES Y PHYSICS) */ document.addEventListener("keydown",e=>{ if(e.key==="a"||e.key==="ArrowLeft") x-=6; if(e.key==="d"||e.key==="ArrowRight") x+=6; socket.emit("move",{x}); }); /* MOBILE */ function left(){ x-=10; socket.emit("move",{x}); } function right(){ x+=10; socket.emit("move",{x}); } function down(){ x+=10; socket.emit("move",{x}); } /* JUMP (SERVER CONTROLLED) */ function jump(){ socket.emit("jump"); } /* LOGOUT CLEAN */ function logout(){ localStorage.clear(); location.href="/login.html"; } /* CANVAS */ const c=document.getElementById("c"); const ctx=c.getContext("2d"); c.width=innerWidth; c.height=innerHeight; /* WORLD */ function world(){ ctx.fillStyle="#7ad67a"; ctx.fillRect(0,500,innerWidth,300); for(let i=0;i<6;i++){ let tx = 150 + i*180; ctx.fillStyle="#4b2e1f"; ctx.fillRect(tx,450,20,60); ctx.fillStyle="#2ecc71"; ctx.beginPath(); ctx.arc(tx+10,430,30,0,Math.PI*2); ctx.fill(); } } /* STICKMAN */ function draw(p){ let walk = Math.sin(p.anim||0)*5; ctx.strokeStyle="#000"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(p.x,p.y-40,10,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y-30); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y-20); ctx.lineTo(p.x-10,p.y-10+walk); ctx.moveTo(p.x,p.y-20); ctx.lineTo(p.x+10,p.y-10-walk); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-10+walk,p.y+20); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+10-walk,p.y+20); ctx.stroke(); } /* LOOP */ function loop(){ ctx.clearRect(0,0,c.width,c.height); world(); for(let id in players){ draw(players[id]); } requestAnimationFrame(loop); } loop(); </script> </body> </html>
