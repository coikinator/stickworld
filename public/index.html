<!DOCTYPE html>
<html>
<head>
  <title>StickWorld</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(#dfe9f3, #ffffff);
      font-family: Arial;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #chat {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 250px;
      background: rgba(255,255,255,0.8);
      border-radius: 10px;
      padding: 10px;
    }

    input {
      width: 100%;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="chat">
  <div id="messages"></div>
  <input id="msg" placeholder="Type...">
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const token = localStorage.getItem('token');
const username = localStorage.getItem('username');

if (!token) {
  location.href = '/login.html';
}

const socket = io();

socket.emit('join', { username });

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let players = {};

socket.on('players', data => {
  players = data;
});

socket.on('chat', data => {
  const div = document.createElement('div');
  div.innerText = data.username + ": " + data.text;
  document.getElementById('messages').appendChild(div);
});

document.getElementById('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    socket.emit('chat', { text: e.target.value });
    e.target.value = '';
  }
});

let x = 200, y = 200;

document.addEventListener('keydown', e => {
  if (e.key === 'w') y -= 5;
  if (e.key === 's') y += 5;
  if (e.key === 'a') x -= 5;
  if (e.key === 'd') x += 5;

  socket.emit('move', { x, y });
});

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let id in players) {
    let p = players[id];

    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();

    ctx.fillText(p.username, p.x - 10, p.y - 15);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
