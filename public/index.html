<!DOCTYPE html>
<html>
<head>
<title>StickWorld</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #dff2ff;
}

/* CANVAS */
canvas {
  display: block;
}

/* TOP UI */
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 10px 15px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius: 12px;
}

/* CHAT */
#chat {
  position: absolute;
  bottom: 10px;
  left: 10px;
  width: 240px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 10px;
}

#msgs {
  height: 100px;
  overflow-y: auto;
  font-size: 12px;
}

#msg {
  width: 100%;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* MOBILE CONTROLS */
#controls {
  position: absolute;
  bottom: 20px;
  right: 20px;

  display: none;
  grid-template-columns: 50px 50px 50px;
  gap: 5px;
}

.btn {
  width: 50px;
  height: 50px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  text-align: center;
  line-height: 50px;
  user-select: none;
}
</style>
</head>

<body>

<!-- UI -->
<div id="ui">
  <div>🎮 StickWorld</div>

  <div>
    👤 <span id="name"></span> |
    🪙 <span id="coins">0</span>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="msgs"></div>
  <input id="msg" placeholder="chat...">
</div>

<!-- MOBILE -->
<div id="controls">
  <div></div>
  <div class="btn" onmousedown="move('up')">⬆</div>
  <div></div>

  <div class="btn" onmousedown="move('left')">⬅</div>
  <div class="btn" onmousedown="move('down')">⬇</div>
  <div class="btn" onmousedown="move('right')">➡</div>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const username = localStorage.getItem("username");
if(!username) location.href="/login.html";

document.getElementById("name").innerText = username;

/* mobile detect */
if(/Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent)){
  document.getElementById("controls").style.display = "grid";
}

/* anti double tab */
if(sessionStorage.getItem("joined")){
  alert("Game already open in this tab!");
  location.href="/";
}
sessionStorage.setItem("joined","1");

/* state */
let players = {};
let x = 300, y = 300;

/* join */
socket.emit("join", { username });

/* players update */
socket.on("players", p => {
  players = p;

  for(let id in p){
    if(p[id].username === username){
      document.getElementById("coins").innerText = p[id].coins ?? 0;
    }
  }
});

/* chat receive */
socket.on("chat", data => {
  addChat(data.username, data.text);
  bubbles[data.id] = { text: data.text, time: Date.now() };
});

/* chat send */
document.getElementById("msg").addEventListener("keydown", e => {
  if(e.key === "Enter"){
    socket.emit("chat", { text: e.target.value });
    e.target.value = "";
  }
});

/* movement */
document.addEventListener("keydown", e => {
  if(e.key==="w"||e.key==="ArrowUp") y-=5;
  if(e.key==="s"||e.key==="ArrowDown") y+=5;
  if(e.key==="a"||e.key==="ArrowLeft") x-=5;
  if(e.key==="d"||e.key==="ArrowRight") x+=5;

  socket.emit("move", { x, y });
});

/* mobile move */
function move(dir){
  if(dir==="up") y-=10;
  if(dir==="down") y+=10;
  if(dir==="left") x-=10;
  if(dir==="right") x+=10;

  socket.emit("move", { x, y });
}

/* logout */
function logout(){
  localStorage.clear();
  sessionStorage.clear();
  location.href="/login.html";
}

/* chat UI */
function addChat(user, text){
  const div = document.createElement("div");
  div.innerText = user + ": " + text;
  document.getElementById("msgs").appendChild(div);
}

/* bubbles */
const bubbles = {};

/* canvas */
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

/* stickman */
function drawStick(p){
  let walk = Math.sin(p.anim || 0) * 6;

  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.arc(p.x, p.y-40, 10, 0, Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x, p.y-30);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x, p.y-20);
  ctx.lineTo(p.x-10, p.y-10+walk);
  ctx.moveTo(p.x, p.y-20);
  ctx.lineTo(p.x+10, p.y-10-walk);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x-10+walk, p.y+20);
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x+10-walk, p.y+20);
  ctx.stroke();
}

/* bubble */
function bubble(p, text){
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fillRect(p.x-50, p.y-80, 110, 20);

  ctx.fillStyle = "#000";
  ctx.font = "12px Arial";
  ctx.fillText(text, p.x-45, p.y-65);
}

/* loop */
function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  for(let id in players){
    let p = players[id];

    drawStick(p);

    if(bubbles[id]){
      if(Date.now() - bubbles[id].time < 3000){
        bubble(p, bubbles[id].text);
      }
    }
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
