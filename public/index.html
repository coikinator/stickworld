<!DOCTYPE html>
<html>
<head>
<title>StickWorld</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(#bfe9ff, #ffffff);
}

canvas { display:block; }

/* UI */
#ui {
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:rgba(255,255,255,0.7);
  border-radius:14px;
  backdrop-filter:blur(10px);
}

button {
  border:none;
  padding:8px 12px;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
}

/* CHAT */
#chat {
  position:absolute;
  bottom:10px;
  left:10px;
  width:260px;
  background:rgba(255,255,255,0.7);
  border-radius:12px;
  padding:10px;
}

#msgs {
  height:100px;
  overflow:auto;
  font-size:12px;
}

#msg {
  width:100%;
}

/* MOBILE */
#controls {
  position:absolute;
  bottom:20px;
  right:20px;
  display:none;
  grid-template-columns:50px 50px 50px;
  gap:5px;
}

.btn {
  width:50px;
  height:50px;
  background:rgba(0,0,0,0.15);
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  user-select:none;
}
</style>
</head>

<body>

<div id="ui">
  <div>StickWorld</div>

  <div>
    <div id="name"></div>
    Coins: <span id="coins">0</span><br>
    <span id="timer">loading...</span>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<div id="chat">
  <div id="msgs"></div>
  <input id="msg" placeholder="chat...">
</div>

<div id="controls">
  <div></div>
  <div class="btn" onmousedown="jump()">⬆</div>
  <div></div>

  <div class="btn" onmousedown="move(-1)">⬅</div>
  <div class="btn" onmousedown="stop()">●</div>
  <div class="btn" onmousedown="move(1)">➡</div>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

/* USER */
const username = localStorage.getItem("username");
if(!username) location.href="/login.html";

document.getElementById("name").innerText = username;

/* MOBILE */
if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
  document.getElementById("controls").style.display="grid";
}

/* STATE */
let players = {};
let x = Number(localStorage.getItem("x")) || 300;
let y = Number(localStorage.getItem("y")) || 500;
let vx = 0;
let vy = 0;
let onGround = true;

/* COINS SYNC FIX */
let coins = Number(localStorage.getItem("coins")) || 0;

/* JOIN */
socket.emit("join",{username});

/* RECEIVE */
socket.on("players", p=>{
  players = p;

  for(let id in p){
    if(p[id].username === username){
      coins = p[id].coins || 0;

      document.getElementById("coins").innerText = coins;

      let t = p[id].timeLeft || 600000;
      let m = Math.floor(t/60000);
      let s = Math.floor((t%60000)/1000);

      document.getElementById("timer").innerText =
      `Next 50 coins in ${m}:${String(s).padStart(2,"0")}`;
    }
  }
});

/* CHAT */
socket.on("chat", d=>{
  let div=document.createElement("div");
  div.innerText=d.username+": "+d.text;
  document.getElementById("msgs").appendChild(div);
});

/* INPUT */
document.getElementById("msg").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    socket.emit("chat",{text:e.target.value});
    e.target.value="";
  }
});

/* MOVE */
let dir = 0;

function move(d){ dir = d; }
function stop(){ dir = 0; }

function jump(){
  if(onGround){
    vy = -12;
    onGround = false;
  }
  socket.emit("jump");
}

/* KEYBOARD */
document.addEventListener("keydown",e=>{
  if(e.key==="a") dir=-1;
  if(e.key==="d") dir=1;
  if(e.key===" ") jump();
});

document.addEventListener("keyup",e=>{
  if(e.key==="a"||e.key==="d") dir=0;
});

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="/login.html";
}

/* CANVAS */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* WORLD */
function world(){
  ctx.fillStyle="#7ad67a";
  ctx.fillRect(0,500,c.width,300);
}

/* DRAW */
function draw(p){
  let walk = Math.sin(p.anim||0)*5;

  ctx.strokeStyle="#000";
  ctx.lineWidth=2;

  ctx.beginPath();
  ctx.arc(p.x,p.y-40,10,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x,p.y-30);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x,p.y-20);
  ctx.lineTo(p.x-10,p.y-10+walk);
  ctx.moveTo(p.x,p.y-20);
  ctx.lineTo(p.x+10,p.y-10-walk);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
  ctx.lineTo(p.x-10+walk,p.y+20);
  ctx.moveTo(p.x,p.y);
  ctx.lineTo(p.x+10-walk,p.y+20);
  ctx.stroke();
}

/* LOOP (CLIENT PHYSICS FIX) */
function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  world();

  /* movement */
  x += dir * 5;

  /* gravity */
  vy += 0.6;
  y += vy;

  if(y > 500){
    y = 500;
    vy = 0;
    onGround = true;
  }

  /* save (NO RESET FIX) */
  localStorage.setItem("x",x);
  localStorage.setItem("y",y);
  localStorage.setItem("coins",coins);

  /* send */
  socket.emit("move",{x,y});

  /* draw self as fake player */
  draw({x,y,anim:performance.now()/200});

  for(let id in players){
    draw(players[id]);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
