<!DOCTYPE html>
<html>
<head>
<title>StickWorld</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(#bfe9ff, #ffffff);
}

canvas {
  display: block;
}

/* TOP BAR */
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 10px 15px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius: 14px;
}

button {
  background: rgba(0,0,0,0.08);
  border: none;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
}

/* CHAT */
#chat {
  position: absolute;
  bottom: 10px;
  left: 10px;
  width: 250px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 10px;
}

#msgs {
  height: 110px;
  overflow-y: auto;
  font-size: 12px;
}

#msg {
  width: 100%;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* MOBILE */
#controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: none;
  grid-template-columns: 50px 50px 50px;
  gap: 5px;
}

.btn {
  width: 50px;
  height: 50px;
  background: rgba(0,0,0,0.15);
  border-radius: 10px;
  text-align: center;
  line-height: 50px;
  user-select: none;
}
</style>
</head>

<body>

<div id="ui">
  <div>StickWorld</div>

  <div>
    <div id="name"></div>
    Coins: <span id="coins">0</span><br>
    <span id="timer">Loading...</span>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<div id="chat">
  <div id="msgs"></div>
  <input id="msg" placeholder="chat...">
</div>

<div id="controls">
  <div></div>
  <div class="btn" onmousedown="jump()">⬆</div>
  <div></div>

  <div class="btn" onmousedown="hold('left')" onmouseup="stop()">⬅</div>
  <div class="btn" onmousedown="hold('down')" onmouseup="stop()">⬇</div>
  <div class="btn" onmousedown="hold('right')" onmouseup="stop()">➡</div>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

/* USER */
const username = localStorage.getItem("username");
if(!username) location.href="/login.html";

document.getElementById("name").innerText = username;

/* MOBILE */
if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
  document.getElementById("controls").style.display = "grid";
}

/* IMPORTANT: NO LOCAL POSITION (FIX BUG) */
socket.emit("join",{username});

/* INPUT STATE */
let holdInterval;

/* HOLD MOVE FIX */
function hold(dir){
  clearInterval(holdInterval);

  holdInterval = setInterval(()=>{
    if(dir==="left") socket.emit("move",{x: -6});
    if(dir==="right") socket.emit("move",{x: 6});
  },50);
}

function stop(){
  clearInterval(holdInterval);
}

/* PC MOVE */
document.addEventListener("keydown",e=>{
  if(e.key==="a") socket.emit("move",{x:-6});
  if(e.key==="d") socket.emit("move",{x:6});
  if(e.code==="Space") socket.emit("jump");
});

/* MOBILE JUMP */
function jump(){
  socket.emit("jump");
}

/* DATA */
socket.on("players",p=>{
  for(let id in p){
    if(p[id].username===username){

      document.getElementById("coins").innerText = p[id].coins;

      let t = p[id].timeLeft;
      let m = Math.floor(t/60000);
      let s = Math.floor((t%60000)/1000);

      document.getElementById("timer").innerText =
      "Next coins in " + m + ":" + String(s).padStart(2,'0');
    }
  }
});

/* CHAT */
socket.on("chat",d=>{
  const div=document.createElement("div");
  div.innerText=d.username+": "+d.text;
  document.getElementById("msgs").appendChild(div);
});

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="/login.html";
}
</script>

</body>
</html>
