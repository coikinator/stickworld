<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StickWorld — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
.logo-icon{
  width:70px;
  height:70px;
  margin:0 auto 14px;
  
  background:url("https://stickworld.neocities.org/favicon.png") center/cover no-repeat;
  
  border-radius:16px;
  box-shadow:
    0 0 25px rgba(91,163,245,0.6),
    0 0 60px rgba(91,163,245,0.2);
}
  
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sky1:#1a2a4a;--sky2:#0d1520;
  --glass:rgba(255,255,255,0.07);
  --border:rgba(100,180,255,0.18);
  --accent:#5ba3f5;--accent2:#ff6b6b;
  --text:#c8daf8;--muted:#4a6a9a;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Rajdhani',sans-serif;
  background:linear-gradient(160deg,var(--sky1) 0%,var(--sky2) 100%);
  color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
}

/* Stars bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 20%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 10%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 80%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 85%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 42% 70%,rgba(255,255,255,.3) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}

/* Floating stickmen in bg */
.bg-stick{position:fixed;opacity:0.06;pointer-events:none;z-index:0;}

.container{
  position:relative;z-index:1;
  width:min(420px,92vw);
  display:flex;flex-direction:column;align-items:center;gap:0;
}

.logo-wrap{text-align:center;margin-bottom:32px;}
.logo{
  font-family:'Orbitron',monospace;
  font-size:clamp(32px,8vw,52px);
  font-weight:800;
  letter-spacing:6px;
  color:#fff;
  text-shadow:0 0 40px rgba(91,163,245,.6),0 0 80px rgba(91,163,245,.2);
  line-height:1;
}
.logo span{color:var(--accent2);}
.tagline{
  font-size:clamp(11px,2.5vw,13px);
  color:var(--muted);
  letter-spacing:3px;
  margin-top:8px;
  text-transform:uppercase;
}

/* Animated stickman preview */
.preview{
  width:100%;height:100px;
  position:relative;margin-bottom:24px;
  overflow:hidden;
}
.preview canvas{width:100%;height:100%;}

.card{
  width:100%;
  background:linear-gradient(135deg,rgba(30,50,90,.85),rgba(15,28,60,.9));
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 28px;
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
}

.card-title{
  font-family:'Orbitron',monospace;
  font-size:13px;letter-spacing:3px;
  color:var(--muted);text-align:center;
  margin-bottom:22px;text-transform:uppercase;
}

.user-info{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  background:rgba(91,163,245,.08);
  border:1px solid rgba(91,163,245,.15);
  border-radius:12px;
  margin-bottom:20px;
}
.avatar{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--accent),#3a7adf);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.user-name{font-size:16px;font-weight:600;color:#fff;}
.user-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.btn-play{
  width:100%;padding:14px;
  background:linear-gradient(180deg,#2a6adf 0%,#1540a0 100%);
  border:1px solid rgba(91,163,245,.4);
  border-radius:12px;
  color:#d0e8ff;
  font-family:'Orbitron',monospace;
  font-size:15px;letter-spacing:3px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(40,100,255,.3),inset 0 1px 0 rgba(255,255,255,.12);
  transition:all .2s;
  margin-bottom:12px;
}
.btn-play:hover{background:linear-gradient(180deg,#3a7aef 0%,#2050b0 100%);transform:translateY(-1px);}
.btn-play:active{transform:translateY(0);}

.btn-logout{
  width:100%;padding:10px;
  background:rgba(255,107,107,.08);
  border:1px solid rgba(255,107,107,.2);
  border-radius:12px;
  color:rgba(255,150,150,.8);
  font-family:'Rajdhani',sans-serif;
  font-size:14px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;
}
.btn-logout:hover{background:rgba(255,107,107,.15);}

/* Not logged in */
.btn-register{
  width:100%;padding:14px;
  background:linear-gradient(180deg,#2a6adf 0%,#1540a0 100%);
  border:1px solid rgba(91,163,245,.4);
  border-radius:12px;
  color:#d0e8ff;
  font-family:'Orbitron',monospace;
  font-size:14px;letter-spacing:2px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(40,100,255,.3),inset 0 1px 0 rgba(255,255,255,.12);
  transition:all .2s;margin-bottom:10px;
  text-decoration:none;display:block;text-align:center;
}
.btn-register:hover{background:linear-gradient(180deg,#3a7aef,#2050b0);transform:translateY(-1px);}
.btn-login{
  width:100%;padding:11px;
  background:rgba(91,163,245,.08);
  border:1px solid rgba(91,163,245,.2);
  border-radius:12px;
  color:var(--accent);
  font-family:'Rajdhani',sans-serif;
  font-size:15px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;
  text-decoration:none;display:block;text-align:center;
}
.btn-login:hover{background:rgba(91,163,245,.15);}

.footer{margin-top:20px;font-size:11px;color:var(--muted);text-align:center;letter-spacing:1px;}

/* Modal overlay */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,10,.7);backdrop-filter:blur(6px);
  z-index:100;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  width:min(360px,88vw);
  background:linear-gradient(135deg,rgba(25,40,80,.97),rgba(12,22,50,.98));
  border:1px solid rgba(255,107,107,.25);
  border-radius:18px;padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  text-align:center;
}
.modal-icon{font-size:36px;margin-bottom:12px;}
.modal-title{font-family:'Orbitron',monospace;font-size:15px;color:#ff9999;letter-spacing:2px;margin-bottom:10px;}
.modal-text{font-size:13px;color:#8898b8;line-height:1.6;margin-bottom:22px;}
.modal-btns{display:flex;flex-direction:column;gap:8px;}
.modal-btn-yes{
  padding:11px;background:rgba(255,80,80,.15);
  border:1px solid rgba(255,80,80,.3);border-radius:10px;
  color:#ff9999;font-size:13px;cursor:pointer;transition:all .2s;
}
.modal-btn-yes:hover{background:rgba(255,80,80,.25);}
.modal-btn-no{
  padding:11px;background:rgba(91,163,245,.08);
  border:1px solid rgba(91,163,245,.2);border-radius:10px;
  color:var(--accent);font-size:13px;cursor:pointer;transition:all .2s;
}
.modal-btn-no:hover{background:rgba(91,163,245,.15);}
</style>
</head>
<body>

<canvas class="bg-stick" id="bgCanvas"></canvas>

<div class="container">
<div class="logo-wrap">
  <div class="logo-icon"></div>
  <div class="logo">STICK<span>WORLD</span></div>
  <div class="tagline">Multiplayer Stickman Universe</div>
</div>

  <canvas class="preview" id="previewCanvas" width="420" height="100"></canvas>

  <!-- Logged in -->
  <div class="card" id="cardLoggedIn" style="display:none">
    <div class="card-title">Ready to Play</div>
    <div class="user-info">
      <div class="avatar">🕹️</div>
      <div>
        <div class="user-name" id="welcomeName"></div>
        <div class="user-sub">Your stickman awaits</div>
      </div>
    </div>
    <button class="btn-play" onclick="enterGame()">▶ ENTER WORLD</button>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>

  <!-- Not logged in -->
  <div class="card" id="cardGuest">
    <div class="card-title">Join the World</div>
    <a class="btn-register" href="/register.html">CREATE ACCOUNT</a>
    <a class="btn-login" href="/login.html">Already have an account? Sign in</a>
  </div>

  <div class="footer">Free to play · No downloads · Just fun</div>
</div>

<!-- Already in game modal -->
<div class="modal-bg" id="alreadyModal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">ALREADY IN GAME</div>
    <div class="modal-text">You are already playing on another device.<br>Do you want to kick that session and play here?</div>
    <div class="modal-btns">
      <button class="modal-btn-yes" onclick="kickAndPlay()">Yes — play on this device</button>
      <button class="modal-btn-no" onclick="closeModal()">No — go back</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const username = localStorage.getItem('username');

if (token && username) {
  document.getElementById('cardLoggedIn').style.display = 'block';
  document.getElementById('cardGuest').style.display = 'none';
  document.getElementById('welcomeName').innerText = username;
}

async function enterGame() {
  // Check if already in game
  try {
    const res = await fetch('/api/check-session', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.alreadyInGame) {
      document.getElementById('alreadyModal').classList.add('open');
      return;
    }
  } catch(e) {}
  window.location.href = '/game.html';
}

async function kickAndPlay() {
  try {
    await fetch('/api/kick-session', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });
  } catch(e) {}
  document.getElementById('alreadyModal').classList.remove('open');
  window.location.href = '/game.html';
}

function closeModal() {
  document.getElementById('alreadyModal').classList.remove('open');
}

function doLogout() {
  localStorage.clear();
  location.reload();
}

// Preview animation
const pc = document.getElementById('previewCanvas');
const pctx = pc.getContext('2d');
pc.width = pc.offsetWidth * devicePixelRatio;
pc.height = pc.offsetHeight * devicePixelRatio;
pctx.scale(devicePixelRatio, devicePixelRatio);
const pw = pc.offsetWidth, ph = pc.offsetHeight;

let pt = 0;
const previewPlayers = [
  {x:60,  color:'#5ba3f5', speed:1.2},
  {x:160, color:'#ff6b6b', speed:0.9},
  {x:280, color:'#2ecc71', speed:1.1},
  {x:370, color:'#e67e22', speed:1.0},
];

function drawPreviewStick(x, t, color) {
  const y = ph - 18;
  const ls = Math.sin(t*Math.PI*2)*12;
  const as = Math.sin(t*Math.PI*2)*10;
  pctx.strokeStyle = color; pctx.lineWidth = 2; pctx.lineCap = 'round';
  pctx.beginPath(); pctx.arc(x, y-34, 8, 0, Math.PI*2); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(x,y-26); pctx.lineTo(x,y-10); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(x,y-22); pctx.lineTo(x-10-as,y-14); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(x,y-22); pctx.lineTo(x+10+as,y-14); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(x,y-10); pctx.lineTo(x-7-ls*0.4,y-2); pctx.lineTo(x-8-ls*0.7,y+10); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(x,y-10); pctx.lineTo(x+7+ls*0.4,y-2); pctx.lineTo(x+8+ls*0.7,y+10); pctx.stroke();
}

function animPreview() {
  pctx.clearRect(0,0,pw,ph);
  // ground line
  pctx.strokeStyle='rgba(91,163,245,0.2)'; pctx.lineWidth=1;
  pctx.beginPath(); pctx.moveTo(0,ph-8); pctx.lineTo(pw,ph-8); pctx.stroke();

  pt += 0.04;
  previewPlayers.forEach(p => {
    p.x += p.speed;
    if (p.x > pw+20) p.x = -20;
    drawPreviewStick(p.x, pt * p.speed, p.color);
  });
  requestAnimationFrame(animPreview);
}
animPreview();
</script>
</body>
</html>
