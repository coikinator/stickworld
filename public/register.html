<!DOCTYPE html>
<html>
<head>
<title>StickWorld Register</title>
<link rel="icon" type="image/png" href="https://stickworld.neocities.org/favicon.png">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  background: linear-gradient(135deg, #cfe9ff, #ffffff);
}

.card {
  width: 300px;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  text-align: center;
  animation: fadeIn 0.5s ease;
}

h2 {
  margin-bottom: 20px;
  color: #333;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.1);
  outline: none;
  transition: 0.2s;
}

input:focus {
  border: 1px solid #4da6ff;
  box-shadow: 0 0 8px rgba(77,166,255,0.4);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #4da6ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #3399ff;
  transform: scale(1.03);
}

a {
  color: #4da6ff;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
  <h2>Create Account</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <p style="margin-top:15px;">
    Already have an account? <a href="/login.html">Login</a>
  </p>
</div>

<script>
if (localStorage.getItem('token')) location.href = 'https://stickworld.onrender.com/';
  
async function register() {
  const res = await fetch('/api/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: document.getElementById('user').value,
      password: document.getElementById('pass').value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem('token', data.token);
    localStorage.setItem('username', data.username);
    location.href = '/';
  } else {
    alert(data.error || "Register failed");
  }
}

document.addEventListener("keydown", function(e) {
  if (
    e.ctrlKey && (
      e.key === "u" ||
      e.key === "s" ||
      e.key === "U" ||
      e.key === "S"
    )
  ) {
    e.preventDefault();
    alert("Nicht erlaubt!");
  }
});

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e) {
  if (e.key === "F12") {
    e.preventDefault();
  }
});
  
</script>

</body>
</html>
